server:
  port: 8084

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql-db}:3306/${MYSQL_DB:rechargerhub_payments}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

# ✅ ACTUATOR + ZIPKIN CONFIG (FIXED)
management:
  endpoints:
    web:
      exposure:
        include: "*"   # 🔥 VERY IMPORTANT

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://zipkin:9411}/api/v2/spans

# ✅ EUREKA CONFIG
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka-server:8761/eureka/}

  instance:
    prefer-ip-address: true


# ✅ LOGGING FOR TRACE DEBUGGING
logging:
  level:
    root: INFO
    org.springframework.web: DEBUG

  pattern:
    level: "%5p [${spring.application.name},%X{traceId},%X{spanId}]"

# ✅ SWAGGER PATH CONFIG (FOR GATEWAY AGGREGATION)
springdoc:
  api-docs:
    path: /api/payments/v3/api-docs