server:
  port: 8082

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql-db}:3306/${MYSQL_DB:rechargerhub_users}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false


# ✅ ACTUATOR + ZIPKIN CONFIG
management:
  endpoints:
    web:
      exposure:
        include: "*"

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://zipkin:9411}/api/v2/spans

# ✅ EUREKA CONFIG
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka-server:8761/eureka/}
  instance:
    prefer-ip-address: true


# ✅ JWT CONFIG
jwt:
  secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
  expiration: 86400000

# ✅ LOGGING
logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
  pattern:
    level: "%5p [${spring.application.name},%X{traceId},%X{spanId}]"

# ✅ CLOUDINARY CONFIG (HARMONIZED)
cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME}
  api_key: ${CLOUDINARY_API_KEY}
  api_secret: ${CLOUDINARY_API_SECRET}

# ✅ SWAGGER PATH CONFIG (FOR GATEWAY AGGREGATION)
springdoc:
  api-docs:
    path: /users/v3/api-docs