version: '3.8'

services:
  # --- INFRASTRUCTURE ---
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  zipkin:
    image: openzipkin/zipkin
    ports:
      - "9411:9411"

  # --- MICROSERVICES (PULLED FROM DOCKER HUB) ---
  eureka-server:
    image: dikshya1801/recharge-eureka-server:latest
    ports:
      - "8761:8761"
    environment:
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/

  gateway-service:
    image: dikshya1801/recharge-gateway:latest
    ports:
      - "8989:8989"
    environment:
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - ZIPKIN_URL=http://zipkin:9411
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - eureka-server
      - zipkin

  user-service:
    image: dikshya1801/recharge-user-service:latest
    ports:
      - "8082:8082"
    environment:
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - ZIPKIN_URL=http://zipkin:9411
    depends_on:
      - eureka-server
      - zipkin

  operator-service:
    image: dikshya1801/recharge-operator-service:latest
    ports:
      - "8083:8083"
    environment:
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - ZIPKIN_URL=http://zipkin:9411
    depends_on:
      - eureka-server
      - zipkin

  payment-service:
    image: dikshya1801/recharge-payment-service:latest
    ports:
      - "8084:8084"
    environment:
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - ZIPKIN_URL=http://zipkin:9411
    depends_on:
      - rabbitmq
      - eureka-server
      - zipkin

  notification-service:
    image: dikshya1801/recharge-notification-service:latest
    ports:
      - "8085:8085"
    environment:
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - ZIPKIN_URL=http://zipkin:9411
    depends_on:
      - rabbitmq
      - eureka-server
      - zipkin

  recharge-service:
    image: dikshya1801/recharge-recharge-service:latest
    ports:
      - "8086:8086"
    environment:
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - ZIPKIN_URL=http://zipkin:9411
    depends_on:
      - eureka-server
      - zipkin

  # --- OBSERVABILITY ---
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
