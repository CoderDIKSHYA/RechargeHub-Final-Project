server:
  port: 8989

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: 
              - "http://localhost:4200"
              - "http://localhost:57285"
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**, /users/**, /admin/**
          filters:
            - RewritePath=/api/(?<segment>.*), /$\{segment}
            - JwtAuthenticationFilter
            - name: CircuitBreaker
              args:
                name: userServiceCB
                fallbackUri: forward:/fallback/user

        - id: operator-service
          uri: lb://operator-service
          predicates:
            - Path=/api/operators/**, /operators/**, /api/plans/**, /plans/**
          filters:
            - RewritePath=/api/(?<segment>.*), /$\{segment}
            - JwtAuthenticationFilter
            - name: CircuitBreaker
              args:
                name: operatorServiceCB
                fallbackUri: forward:/fallback/operator

        - id: recharge-service
          uri: lb://recharge-service
          predicates:
            - Path=/api/recharges/**, /recharges/**
          filters:
            - RewritePath=/api/(?<segment>.*), /$\{segment}
            - JwtAuthenticationFilter
            - name: CircuitBreaker
              args:
                name: rechargeServiceCB
                fallbackUri: forward:/fallback/recharge

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - RewritePath=/api/(?<segment>.*), /$\{segment}
            - JwtAuthenticationFilter
            - name: CircuitBreaker
              args:
                name: paymentServiceCB
                fallbackUri: forward:/fallback/payment

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - JwtAuthenticationFilter


# ================= ACTUATOR + ZIPKIN =================
management:
  endpoints:
    web:
      exposure:
        include: "*"

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://zipkin:9411}/api/v2/spans


# ================= EUREKA CONFIG =================
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka-server:8761/eureka/}


  instance:
    prefer-ip-address: true


# ================= JWT CONFIG =================
jwt:
  secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
  expiration: 86400000


# ================= LOGGING =================
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG

  pattern:
    level: "%5p [${spring.application.name},%X{traceId},%X{spanId}]"

# ================= SWAGGER CONFIG =================
springdoc:
  swagger-ui:
    urls:
      - name: user-service
        url: /users/v3/api-docs
      - name: operator-service
        url: /operators/v3/api-docs
      - name: recharge-service
        url: /recharges/v3/api-docs
      - name: payment-service
        url: /payments/v3/api-docs
      - name: notification-service
        url: /api/notifications/v3/api-docs

# ✅ RESILIENCE4J CONFIG
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 20
        permittedNumberOfCallsInHalfOpenState: 5
        waitDurationInOpenState: 5s
        failureRateThreshold: 60
        registerHealthIndicator: true
  timelimiter:
    configs:
      default:
        timeoutDuration: 30s