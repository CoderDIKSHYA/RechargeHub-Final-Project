services:
  # 1. Redis Cache Service (Key-Value)
  - type: keyvalue
    name: redis
    plan: free
    ipAllowList: [] # Access restricted only to internal services

  # 2. Zipkin Tracing Service
  - type: web
    name: zipkin
    env: image
    image:
      url: docker.io/openzipkin/zipkin:latest
    plan: free

  # 3. Eureka Discovery Server
  - type: web
    name: eureka-server
    env: docker
    dockerContext: backend/eureka-server
    dockerfilePath: backend/eureka-server/Dockerfile
    plan: free
    envVars:
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:8761/eureka/

  # 4. Gateway Service (Public - exposed to frontend)
  - type: web
    name: gateway-service
    env: docker
    dockerContext: backend/gatewayservice
    dockerfilePath: backend/gatewayservice/Dockerfile
    plan: free
    envVars:
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:8761/eureka/
      - key: ZIPKIN_URL
        value: http://zipkin:9411/api/v2/spans
      - key: JWT_SECRET
        value: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

  # 5. User Service
  - type: web
    name: user-service
    env: docker
    dockerContext: backend/user-service
    dockerfilePath: backend/user-service/Dockerfile
    plan: free
    envVars:
      - fromGroup: rechargehub-shared-env
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://mysql-14adf53c-runuwaldikshya-a4b8.h.aivencloud.com:24607/rechargerhub_users?useSSL=true&trustServerCertificate=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - key: SPRING_DATASOURCE_USERNAME
        value: avnadmin
      - key: SPRING_DATA_REDIS_HOST
        fromService:
          name: redis
          type: keyvalue
          property: host
      - key: SPRING_DATA_REDIS_PORT
        fromService:
          name: redis
          type: keyvalue
          property: port
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:8761/eureka/
      - key: ZIPKIN_URL
        value: http://zipkin:9411/api/v2/spans

  # 6. Operator Service
